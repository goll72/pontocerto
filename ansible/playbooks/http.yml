- name: HTTP server and reverse proxy setup using nginx
  hosts: system
  become: true
  # nginx config snippets that can be reused using YAML anchors
  vars:
    upstreams: &upstreams
      - name: backend
        servers:
          - address: 127.0.0.1:8080
    ssl: &ssl
      certificate: "{{ uacme_conf_dir }}/{{ domain_name }}/cert.pem"
      certificate_key: "{{ uacme_conf_dir }}/private/{{ domain_name }}/key.pem"
    locations: &locations
      - location: /.well-known/acme-challenge
        core:
          root: /var/www
      - location: /
        core:
          root: /srv/www
    common: &common
      gzip:
        enable: true
      custom_directives: |
        location = / {
            return 301 /login/;
        }
      http2:
        enable: true
  tasks:
    - name: Install nginx
      ansible.builtin.package:
        name: nginx
        state: present
    - name: Ensure sites-available does not exist
      ansible.builtin.file:
        path: /etc/nginx/sites-available
        state: absent
    - name: Ensure sites-enabled does not exist
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled
        state: absent
    - name: Ensure /var/www/html does not exist
      ansible.builtin.file:
        path: /var/www/html
        state: absent
    - name: Check if a TLS certificate has been issued already
      ansible.builtin.stat:
        path: "{{ uacme_conf_dir }}/{{ domain_name }}/cert.pem"
      register: tls_cert
    - name: Create a dummy TLS certificate for nginx
      ansible.builtin.shell:
        cmd: |
          mkdir -p {{ uacme_conf_dir }}/private/{{ domain_name }} {{ uacme_conf_dir }}/{{ domain_name }} \
          && openssl req -x509 -newkey ed25519 -days 60 -noenc \
                -keyout {{ uacme_conf_dir }}/private/{{ domain_name }}/key.pem \
                -out {{ uacme_conf_dir }}/{{ domain_name }}/cert.pem \
                -subj "/CN={{ domain_name }}/" \
          && touch {{ uacme_conf_dir }}/dummy.marker
        creates: "{{ uacme_conf_dir }}/dummy.marker"
      when: not tls_cert.stat.exists
    - name: Configure nginx
      ansible.builtin.include_role:
        name: nginxinc.nginx_config
      vars:
        nginx_config_debug_output: true
        nginx_config_http_template_enable: true
        nginx_config_http_template:
          - config:
              upstreams: *upstreams
              servers:
                - core:
                    listen:
                      - port: 443
                        ssl: true
                      - port: 80
                    etag: true
                  locations: *locations
                  ssl: *ssl
                  <<: *common
    - name: Reload nginx to ensure it is has been configured properly for TLS
      ansible.builtin.systemd_service:
        name: nginx
        state: reloaded
        enabled: true
    - name: Ensure /srv/www exists and is owned by www-data
      ansible.builtin.file:
        path: /srv/www
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
