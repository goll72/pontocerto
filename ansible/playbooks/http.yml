- name: HTTP server and reverse proxy setup using nginx
  hosts: system
  become: true
  tasks:
    - name: Install nginx
      ansible.builtin.package:
        name: nginx
        state: present
    - name: Check if a TLS certificate has been issued already
      ansible.builtin.stat:
        path: "{{ uacme_conf_dir }}/{{ domain_name }}/cert.pem"
      register: tls_cert
    - name: Create a dummy TLS certificate for nginx
      ansible.builtin.shell:
        cmd: |
          mkdir -p {{ uacme_conf_dir }}/private/{{ domain_name }} {{ uacme_conf_dir }}/{{ domain_name }} \
          && openssl req -x509 -newkey ed25519 -days 60 -noenc \
                -keyout {{ uacme_conf_dir }}/private/{{ domain_name }}/key.pem \
                -out {{ uacme_conf_dir }}/{{ domain_name }}/cert.pem \
                -subj "/CN={{ domain_name }}/" \
          && touch {{ uacme_conf_dir }}/dummy.marker
        creates: "{{ uacme_conf_dir }}/dummy.marker"
      when: not tls_cert.stat.exists
    - name: Configure nginx
      ansible.builtin.include_role:
        name: nginxinc.nginx_config
      vars:
        nginx_config_debug_output: true
        nginx_config_http_template_enable: true
        nginx_config_http_template:
          - config:
              upstreams:
                - name: backend
                  servers:
                    - address: 127.0.0.1:8080
              servers:
                - core:
                    listen:
                      - port: 443
                        ssl: true
                      - port: 80
                  ssl:
                    certificate: "{{ uacme_conf_dir }}/{{ domain_name }}/cert.pem"
                    certificate_key: "{{ uacme_conf_dir }}/private/{{ domain_name }}/key.pem"
                  locations:
                    - location: /.well-known/acme-challenge
                      core:
                        root: /var/www
                    - location: /
                      core:
                        root: /srv/www
